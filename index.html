<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maxade dagar i Stadsparken – interaktiv karta</title>
  <style>
    :root {
      --accent: #ffcc1a;
      --blue: #14314a;
      --panel: rgba(20, 49, 74, 0.94);
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #10283e;
      color: var(--white);
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .map-shell {
      width: min(100%, 780px);
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      background: var(--blue);
    }

    .map-wrap {
      position: relative;
      width: 100%;
    }

    .map-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
    }

    .pin-hit {
      position: absolute;
      width: 5.2%;
      aspect-ratio: 1 / 1.35;
      transform: translate(-50%, -50%);
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      border-radius: 999px;
    }

    .pin-hit::after {
      content: attr(data-id);
      position: absolute;
      inset: 17% 18% 34% 18%;
      display: grid;
      place-items: center;
      border-radius: 999px;
      font-weight: 800;
      color: transparent;
      outline: 0 solid rgba(255, 204, 26, 0);
      transition: transform 160ms ease, outline 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease;
    }

    .symbol-pin::after {
      content: "";
      inset: 12% 12% 20% 12%;
    }

    .pin-hit:hover::after,
    .pin-hit:focus-visible::after,
    .pin-hit.is-active::after {
      transform: scale(1.35);
      outline: 4px solid var(--accent);
      box-shadow: 0 0 0 8px rgba(255, 204, 26, 0.28), 0 0 26px rgba(255, 204, 26, 0.9);
      background: rgba(255, 204, 26, 0.96);
      color: #10283e;
    }

    .list-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 17.2%;
      background: transparent;
      display: block;
      pointer-events: none;
    }

    .list-column {
      display: contents;
    }

    .list-item {
      position: absolute;
      display: block;
      height: 5.8%;
      padding: 0;
      border-radius: 5px;
      color: transparent;
      background: transparent;
      border: 0;
      text-align: left;
      font-size: 0;
      cursor: pointer;
      pointer-events: auto;
      transition: background 140ms ease;
    }

    .list-item:hover,
    .list-item:focus-visible,
    .list-item.is-active {
      background: rgba(255, 204, 26, 0.34);
      color: transparent;
      outline: none;
    }

    .tooltip {
      position: absolute;
      z-index: 5;
      left: clamp(115px, var(--x), calc(100% - 115px));
      top: clamp(52px, var(--y), calc(100% - 20px));
      transform: translate(-50%, calc(-100% - 14px));
      background: var(--panel);
      color: var(--white);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.2;
      max-width: 220px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .tooltip.is-visible {
      opacity: 1;
    }

    .tooltip::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      width: 12px;
      height: 12px;
      background: var(--panel);
      border-right: 2px solid var(--accent);
      border-bottom: 2px solid var(--accent);
      transform: translateX(-50%) rotate(45deg);
    }

    .edit-panel {
      position: fixed;
      z-index: 20;
      right: 16px;
      bottom: 16px;
      width: min(360px, calc(100vw - 32px));
      display: none;
      gap: 10px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(16, 40, 62, 0.96);
      border: 2px solid var(--accent);
      box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
      font-size: 13px;
      line-height: 1.35;
    }

    body.is-editing .edit-panel {
      display: grid;
    }

    body.is-editing .pin-hit {
      cursor: grab;
      outline: 1px dashed rgba(255, 255, 255, 0.6);
      outline-offset: 2px;
    }

    body.is-editing .pin-hit::after {
      transform: scale(1.15);
      outline: 3px solid var(--accent);
      box-shadow: 0 0 0 6px rgba(255, 204, 26, 0.22), 0 0 18px rgba(255, 204, 26, 0.75);
      background: rgba(255, 204, 26, 0.96);
      color: #10283e;
    }

    body.is-editing .pin-hit:active {
      cursor: grabbing;
    }

    body.is-editing .list-panel {
      pointer-events: auto;
      opacity: 1;
    }

    body.is-editing .list-item {
      background: rgba(255, 204, 26, 0.18);
      outline: 1px dashed rgba(255, 255, 255, 0.75);
      cursor: grab;
    }

    body.is-editing .list-item:active {
      cursor: grabbing;
    }

    .edit-panel button,
    .edit-panel textarea {
      width: 100%;
      border-radius: 8px;
      border: 0;
      font: inherit;
    }

    .edit-panel button {
      padding: 9px 10px;
      font-weight: 800;
      color: #10283e;
      background: var(--accent);
      cursor: pointer;
    }

    .edit-panel textarea {
      min-height: 96px;
      padding: 10px;
      color: #10283e;
      resize: vertical;
    }

    @media (max-width: 620px) {
      .page {
        padding: 0;
        align-items: start;
      }

      .map-shell {
        width: 100%;
        border-radius: 0;
      }

      .pin-hit {
        width: 7%;
      }
    }
  </style>
</head>

  <script>
    const pins = Array.from(document.querySelectorAll('.pin-hit'));
    const items = Array.from(document.querySelectorAll('.list-item'));
    const tooltip = document.querySelector('#tooltip');
    const mapWrap = document.querySelector('#mapWrap');
    const listPanel = document.querySelector('#listPanel');
    const isEditMode = new URLSearchParams(window.location.search).get('edit') === '1';
    const storageKey = 'maxade-dagar-edit-positions-v3';

    if (isEditMode) document.body.classList.add('is-editing');

    const labelById = new Map(
      pins.concat(items).map(function(element) {
        return [element.dataset.id, element.getAttribute('aria-label') || element.dataset.id];
      })
    );

    const savedPositions = JSON.parse(localStorage.getItem(storageKey) || '{}');

    pins.forEach(function(pin, index) {
      const saved = savedPositions['pin-' + pin.dataset.id + '-' + index] || savedPositions[pin.dataset.id];
      if (saved) {
        pin.style.left = saved.left;
        pin.style.top = saved.top;
      }
    });

    items.forEach(function(item, index) {
      const saved = savedPositions['item-' + item.dataset.id + '-' + index];
      if (saved) {
        item.style.left = saved.left;
        item.style.top = saved.top;
        if (saved.width) item.style.width = saved.width;
        if (saved.height) item.style.height = saved.height;
      }
    });

    function setActive(id) {
      clearActive();

      const matchingPins = Array.from(document.querySelectorAll('.pin-hit[data-id="' + id + '"]'));
      const matchingItems = Array.from(document.querySelectorAll('.list-item[data-id="' + id + '"]'));
      const pin = matchingPins[0];
      const item = matchingItems[0];

      matchingPins.forEach(function(pinElement) { pinElement.classList.add('is-active'); });
      matchingItems.forEach(function(itemElement) { itemElement.classList.add('is-active'); });

      if (pin) {
        const label =
          (item && item.getAttribute('aria-label')) ||
          pin.getAttribute('aria-label') ||
          labelById.get(id) ||
          id;

        tooltip.textContent = label;
        tooltip.style.setProperty('--x', pin.style.left);
        tooltip.style.setProperty('--y', pin.style.top);
        tooltip.classList.add('is-visible');
      }
    }

    function clearActive() {
      pins.forEach(function(pin) { pin.classList.remove('is-active'); });
      items.forEach(function(item) { item.classList.remove('is-active'); });
      tooltip.classList.remove('is-visible');
    }

    function saveCurrentPositions() {
      const positions = {};

      pins.forEach(function(pin, index) {
        positions['pin-' + pin.dataset.id + '-' + index] = {
          type: 'pin',
          id: pin.dataset.id,
          left: pin.style.left,
          top: pin.style.top,
          label: pin.getAttribute('aria-label') || pin.dataset.id
        };
      });

      items.forEach(function(item, index) {
        positions['item-' + item.dataset.id + '-' + index] = {
          type: 'item',
          id: item.dataset.id,
          left: item.style.left,
          top: item.style.top,
          width: item.style.width,
          height: item.style.height,
          label: item.getAttribute('aria-label') || item.dataset.id
        };
      });

      localStorage.setItem(storageKey, JSON.stringify(positions));
      return positions;
    }

    pins.concat(items).forEach(function(element) {
      element.addEventListener('mouseenter', function() { setActive(element.dataset.id); });
      element.addEventListener('focus', function() { setActive(element.dataset.id); });
      element.addEventListener('mouseleave', function() {
        if (!isEditMode) clearActive();
      });
      element.addEventListener('blur', function() {
        if (!isEditMode) clearActive();
      });
      element.addEventListener('click', function() { setActive(element.dataset.id); });
    });

    if (isEditMode) {
      let draggedElement = null;
      let dragKind = null;
      let dragStart = null;

      function startDrag(element, kind, event) {
        draggedElement = element;
        dragKind = kind;
        const parentRect = kind === 'pin' ? mapWrap.getBoundingClientRect() : listPanel.getBoundingClientRect();
        dragStart = {
          parentRect: parentRect,
          startX: event.clientX,
          startY: event.clientY,
          left: parseFloat(element.style.left) || 0,
          top: parseFloat(element.style.top) || 0,
          width: parseFloat(element.style.width) || 0,
          height: parseFloat(element.style.height) || 0,
          resize: kind === 'item' && event.shiftKey
        };
        element.setPointerCapture(event.pointerId);
        setActive(element.dataset.id);
      }

      function moveDragged(event) {
        if (!draggedElement || !dragStart) return;

        const dx = ((event.clientX - dragStart.startX) / dragStart.parentRect.width) * 100;
        const dy = ((event.clientY - dragStart.startY) / dragStart.parentRect.height) * 100;

        if (dragStart.resize) {
          const width = Math.max(1, Math.min(100, dragStart.width + dx));
          const height = Math.max(1, Math.min(40, dragStart.height + dy));
          draggedElement.style.width = width.toFixed(2) + '%';
          draggedElement.style.height = height.toFixed(2) + '%';
        } else {
          const left = Math.max(-5, Math.min(105, dragStart.left + dx));
          const top = Math.max(-5, Math.min(105, dragStart.top + dy));
          draggedElement.style.left = left.toFixed(2) + '%';
          draggedElement.style.top = top.toFixed(2) + '%';
        }

        setActive(draggedElement.dataset.id);
      }

      function stopDrag() {
        if (!draggedElement) return;
        saveCurrentPositions();
        draggedElement = null;
        dragKind = null;
        dragStart = null;
      }

      pins.forEach(function(pin) {
        pin.addEventListener('pointerdown', function(event) {
          startDrag(pin, 'pin', event);
        });

        pin.addEventListener('pointermove', moveDragged);
        pin.addEventListener('pointerup', stopDrag);
      });

      items.forEach(function(item) {
        item.addEventListener('pointerdown', function(event) {
          startDrag(item, 'item', event);
        });

        item.addEventListener('pointermove', moveDragged);
        item.addEventListener('pointerup', stopDrag);
      });

      document.querySelector('#exportPositions').addEventListener('click', async function() {
        const positions = saveCurrentPositions();
        const pinRows = Object.values(positions)
          .filter(function(pos) { return pos.type === 'pin'; })
          .map(function(pos) {
            return '<button class="pin-hit" data-id="' + pos.id + '" style="left: ' + pos.left + '; top: ' + pos.top + ';" aria-label="' + pos.label + '"></button>';
          })
          .join(String.fromCharCode(10));

        const itemRows = Object.values(positions)
          .filter(function(pos) { return pos.type === 'item'; })
          .map(function(pos) {
            return '<button class="list-item" data-id="' + pos.id + '" style="left: ' + pos.left + '; top: ' + pos.top + '; width: ' + pos.width + '; height: ' + pos.height + ';" aria-label="' + pos.label + '"></button>';
          })
          .join(String.fromCharCode(10));

        const cssRows = '<!-- Markörer -->' + String.fromCharCode(10) + pinRows + String.fromCharCode(10) + String.fromCharCode(10) + '<!-- Textfält -->' + String.fromCharCode(10) + itemRows;

        const output = document.querySelector('#positionOutput');
        output.value = cssRows;
        output.select();

        try {
          await navigator.clipboard.writeText(cssRows);
        } catch (error) {
          document.execCommand('copy');
        }
      });

      document.querySelector('#resetPositions').addEventListener('click', function() {
        localStorage.removeItem(storageKey);
        window.location.reload();
      });
    }

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') clearActive();
    });
  </script>
</body>
</html>
