<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maxade dagar i Stadsparken – interaktiv karta</title>
  <style>
    :root {
      --accent: #ffcc1a;
      --blue: #14314a;
      --panel: rgba(20, 49, 74, 0.94);
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #10283e;
      color: var(--white);
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .map-shell {
      width: min(100%, 780px);
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      background: var(--blue);
    }

    .map-wrap {
      position: relative;
      width: 100%;
    }

    .map-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
    }

    .pin-hit {
      position: absolute;
      width: 5.2%;
      aspect-ratio: 1 / 1.35;
      transform: translate(-50%, -50%);
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      border-radius: 999px;
    }

    .pin-hit::after {
      content: attr(data-id);
      position: absolute;
      inset: 17% 18% 34% 18%;
      display: grid;
      place-items: center;
      border-radius: 999px;
      font-weight: 800;
      color: transparent;
      outline: 0 solid rgba(255, 204, 26, 0);
      transition: transform 160ms ease, outline 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease;
    }

    .pin-hit:hover::after,
    .pin-hit:focus-visible::after,
    .pin-hit.is-active::after {
      transform: scale(1.35);
      outline: 4px solid var(--accent);
      box-shadow: 0 0 0 8px rgba(255, 204, 26, 0.28), 0 0 26px rgba(255, 204, 26, 0.9);
      background: rgba(255, 204, 26, 0.96);
      color: #10283e;
    }

    .list-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 17.2%;
      background: transparent;
      display: block;
      pointer-events: none;
    }

    .list-column {
      display: contents;
    }

    .list-item {
      position: absolute;
      display: block;
      height: 7.2%;
      padding: 0;
      border-radius: 5px;
      color: transparent;
      background: transparent;
      border: 0;
      text-align: left;
      font-size: 0;
      cursor: pointer;
      pointer-events: auto;
      transition: background 140ms ease;
    }

    .list-item:hover,
    .list-item:focus-visible,
    .list-item.is-active {
      background: rgba(255, 204, 26, 0.45);
      color: transparent;
      outline: none;
    }

    .list-number {
      color: transparent;
    }

    .list-item span {
      color: transparent;
      font-size: 0;
    }

    .tooltip {
      position: absolute;
      z-index: 5;
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, calc(-100% - 14px));
      background: var(--panel);
      color: var(--white);
      border: 2px solid var(--accent);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.2;
      max-width: 220px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .tooltip.is-visible {
      opacity: 1;
    }

    .tooltip::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      width: 12px;
      height: 12px;
      background: var(--panel);
      border-right: 2px solid var(--accent);
      border-bottom: 2px solid var(--accent);
      transform: translateX(-50%) rotate(45deg);
    }

    @media (max-width: 620px) {
      .page {
        padding: 0;
        align-items: start;
      }

      .map-shell {
        width: 100%;
        border-radius: 0;
      }

      .list-panel {
        position: absolute;
        height: 17.2%;
        background: transparent;
      }

      .pin-hit {
        width: 7%;
      }
    }
  

    .edit-panel {
      position: fixed;
      z-index: 20;
      right: 16px;
      bottom: 16px;
      width: min(360px, calc(100vw - 32px));
      display: none;
      gap: 10px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(16, 40, 62, 0.96);
      border: 2px solid var(--accent);
      box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
      font-size: 13px;
      line-height: 1.35;
    }

    body.is-editing .edit-panel {
      display: grid;
    }

    body.is-editing .pin-hit {
      cursor: grab;
      outline: 1px dashed rgba(255, 255, 255, 0.6);
      outline-offset: 2px;
    }

    body.is-editing .pin-hit::after {
      transform: scale(1.15);
      outline: 3px solid var(--accent);
      box-shadow: 0 0 0 6px rgba(255, 204, 26, 0.22), 0 0 18px rgba(255, 204, 26, 0.75);
      background: rgba(255, 204, 26, 0.96);
      color: #10283e;
    }

    body.is-editing .pin-hit:active {
      cursor: grabbing;
    }

    body.is-editing .list-panel {
      pointer-events: none;
      opacity: 0.55;
    }

    body.is-editing .map-wrap {
      z-index: 3;
    }

    .edit-panel button,
    .edit-panel textarea {
      width: 100%;
      border-radius: 8px;
      border: 0;
      font: inherit;
    }

    .edit-panel button {
      padding: 9px 10px;
      font-weight: 800;
      color: #10283e;
      background: var(--accent);
      cursor: pointer;
    }

    .edit-panel textarea {
      min-height: 96px;
      padding: 10px;
      color: #10283e;
      resize: vertical;
    }
  </style>
</head>

  <script>
    const pins = [...document.querySelectorAll('.pin-hit')];
    const items = [...document.querySelectorAll('.list-item')];
    const tooltip = document.querySelector('#tooltip');
    const mapWrap = document.querySelector('#mapWrap');
    const isEditMode = new URLSearchParams(window.location.search).get('edit') === '1';
    const storageKey = 'maxade-dagar-pin-positions-v1';

    if (isEditMode) document.body.classList.add('is-editing');

    const labelById = new Map(
      items.map(item => [
        item.dataset.id,
        item.textContent.replace(/\s+/g, ' ').trim()
      ])
    );

    const savedPositions = JSON.parse(localStorage.getItem(storageKey) || '{}');

    pins.forEach(pin => {
      const saved = savedPositions[pin.dataset.id];
      if (saved) {
        pin.style.left = saved.left;
        pin.style.top = saved.top;
      }
    });

    function setActive(id) {
      clearActive();

      const pin = document.querySelector(`.pin-hit[data-id="${id}"]`);
      const item = document.querySelector(`.list-item[data-id="${id}"]`);

      pin?.classList.add('is-active');
      item?.classList.add('is-active');

      if (pin) {
        tooltip.textContent = labelById.get(id) || id;
        tooltip.style.setProperty('--x', pin.style.left);
        tooltip.style.setProperty('--y', pin.style.top);
        tooltip.classList.add('is-visible');
      }
    }

    function clearActive() {
      pins.forEach(pin => pin.classList.remove('is-active'));
      items.forEach(item => item.classList.remove('is-active'));
      tooltip.classList.remove('is-visible');
    }

    function saveCurrentPositions() {
      const positions = Object.fromEntries(
        pins.map(pin => [
          pin.dataset.id,
          {
            left: pin.style.left,
            top: pin.style.top
          }
        ])
      );
      localStorage.setItem(storageKey, JSON.stringify(positions));
      return positions;
    }

    [...pins, ...items].forEach(element => {
      element.addEventListener('mouseenter', () => setActive(element.dataset.id));
      element.addEventListener('focus', () => setActive(element.dataset.id));
      element.addEventListener('mouseleave', () => {
        if (!isEditMode) clearActive();
      });
      element.addEventListener('blur', () => {
        if (!isEditMode) clearActive();
      });
      element.addEventListener('click', () => setActive(element.dataset.id));
    });

    if (isEditMode) {
      let draggedPin = null;

      pins.forEach(pin => {
        pin.addEventListener('pointerdown', event => {
          draggedPin = pin;
          pin.setPointerCapture(event.pointerId);
          setActive(pin.dataset.id);
        });

        pin.addEventListener('pointermove', event => {
          if (!draggedPin || draggedPin !== pin) return;

          const rect = mapWrap.getBoundingClientRect();
          const left = Math.max(0, Math.min(100, ((event.clientX - rect.left) / rect.width) * 100));
          const top = Math.max(0, Math.min(100, ((event.clientY - rect.top) / rect.height) * 100));

          pin.style.left = `${left.toFixed(2)}%`;
          pin.style.top = `${top.toFixed(2)}%`;
          setActive(pin.dataset.id);
        });

        pin.addEventListener('pointerup', () => {
          if (!draggedPin) return;
          saveCurrentPositions();
          draggedPin = null;
        });
      });

      document.querySelector('#exportPositions')?.addEventListener('click', async () => {
        const positions = saveCurrentPositions();
        const cssRows = Object.entries(positions)
          .map(([id, pos]) => `<button class="pin-hit" data-id="${id}" style="left: ${pos.left}; top: ${pos.top};" aria-label="${labelById.get(id)}"></button>`)
          .join('\n');

        const output = document.querySelector('#positionOutput');
        output.value = cssRows;
        output.select();

        try {
          await navigator.clipboard.writeText(cssRows);
        } catch (error) {
          document.execCommand('copy');
        }
      });

      document.querySelector('#resetPositions')?.addEventListener('click', () => {
        localStorage.removeItem(storageKey);
        window.location.reload();
      });
    }

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') clearActive();
    });
  </script>
</body>
